name: Traki

# ─────────────────────────────────────────────────────────────
# Traki — one-tap time tracker for language learners.
# Project is generated by XcodeGen: `xcodegen generate`.
#
# Deployment target lives HERE, in one place. To promote the app to
# iOS 26 + Liquid Glass once Xcode 26 is installed, bump the value
# under options.deploymentTarget.iOS to "26.0" and regenerate — the
# glass surfaces are already funneled through the `trakiGlass` modifier.
# ─────────────────────────────────────────────────────────────

options:
  bundleIdPrefix: com.yannickherrero
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"                # Swift 6 language mode (strict concurrency)
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "2"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "KY6RHJR4LZ"     # Yannick Herrero's team

packages:
  TrakiKit:
    path: TrakiKit                     # local Swift package — shared core

targets:
  Traki:
    type: application
    platform: iOS
    sources:
      - path: App
        excludes:
          - "*.entitlements"
      # Widget view code is compiled into the app too, only so a DEBUG in-app
      # gallery can render it for verification. The @main bundle stays excluded.
      - path: Widgets
        excludes:
          - "*.entitlements"
          - "Info.plist"
          - "TrakiWidgetBundle.swift"
    dependencies:
      - package: TrakiKit
      - target: TrakiWidgets       # embed the widget extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yannickherrero.traki
        TARGETED_DEVICE_FAMILY: "1"    # iPhone only (spec: iOS / iPhone)
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/Traki.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  TrakiWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: Widgets
        excludes:
          - "*.entitlements"
    dependencies:
      - package: TrakiKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yannickherrero.traki.widgets
        INFOPLIST_FILE: Widgets/Info.plist
        CODE_SIGN_ENTITLEMENTS: Widgets/TrakiWidgets.entitlements

  TrakiTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - package: TrakiKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yannickherrero.traki.tests
        GENERATE_INFOPLIST_FILE: true

  TrakiUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UITests
    dependencies:
      - target: Traki
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yannickherrero.traki.uitests
        GENERATE_INFOPLIST_FILE: true
        TEST_TARGET_NAME: Traki

schemes:
  Traki:
    build:
      targets:
        Traki: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - TrakiTests
        - TrakiUITests
