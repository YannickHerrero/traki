name: Traki

# ─────────────────────────────────────────────────────────────
# Traki — one-tap time tracker for language learners.
# Project is generated by XcodeGen: `xcodegen generate`.
#
# Deployment target lives HERE, in one place. To promote the app to
# iOS 26 + Liquid Glass once Xcode 26 is installed, bump the value
# under options.deploymentTarget.iOS to "26.0" and regenerate — the
# glass surfaces are already funneled through the `trakiGlass` modifier.
# ─────────────────────────────────────────────────────────────

options:
  bundleIdPrefix: com.yannickherrero
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"                # Swift 6 language mode (strict concurrency)
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""               # set your Team here for on-device builds; simulator needs none

packages:
  TrakiKit:
    path: TrakiKit                     # local Swift package — shared core

targets:
  Traki:
    type: application
    platform: iOS
    sources:
      - path: App
    dependencies:
      - package: TrakiKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yannickherrero.traki
        TARGETED_DEVICE_FAMILY: "1"    # iPhone only (spec: iOS / iPhone)
        INFOPLIST_FILE: App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  TrakiTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - package: TrakiKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yannickherrero.traki.tests
        GENERATE_INFOPLIST_FILE: true

schemes:
  Traki:
    build:
      targets:
        Traki: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - TrakiTests
